
<div *ngIf="!linkedToRouter" class="tab-selector">
  <div *ngFor="let tab of tabs" class="tab" [ngClass]="(selectedTab === tab) ? 'selected' : ''" (click)="selectTab(tab)">
      <p class="tab-label">{{tab}}</p>
  </div>
</div>

<div *ngIf="linkedToRouter" class="tab-selector">
  <a *ngFor="let tab of tabs" [routerLink]="tabToURL[tab]" class="tab" routerLinkActive="selected">
      <p class="tab-label">{{tab}}</p>
  </a>
</div>
