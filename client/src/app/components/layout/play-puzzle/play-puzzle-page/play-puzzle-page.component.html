<app-outline-button class="leave-fullscreen-button" label="Exit" (click)="exitFullscreen()" />
<div class="content">

    <header>
        <h1 class="title">PUZZLES</h1>
        <div class="subtitle-container">
            <hr>
            <h2 class="subtitle">ZEN MODE</h2>
            <hr>
        </div>
    </header>

    <div class="main-row">
        <div class="leaderboard"></div>

        <app-outline-button class="undo-button" label="Undo"
        [ngStyle]="{visibility: showUndoButton() ? 'visible' : 'hidden'}" (click)="undo()" />


        <app-nes-board *ngIf="puzzleService.getPuzzle$() | async as puzzle"
            class="board" [scale]="3" [interactable]="true"
            [board]="currentBoard"
            [level]="18"
            [nextPiece]="(placedFirstPiece === undefined && (hoveredPiece | async) === undefined) ? puzzle.currentType : undefined"
            [activePiece]="(hoveredPiece | async) ?? undefined"
            [activePieceOpacity]="(hoveredPiece | async)?.isValidPlacement(currentBoard!) ? 0.7 : 0.35"
            (hoveringBlock)="onHoveringBlock($event)"
            (click)="onClickBoard()"
        />

        <div class="puzzle-details">

            <div class="elo-container"></div>

            <app-nes-panel class="next-box-panel" *ngIf="puzzleService.getPuzzle$() | async as puzzle">
                <h2 class="next-box-text">NEXT</h2>
                <div class="next-piece-container">
                    <app-nes-piece [scale]="3" [piece]="puzzle.nextType" [level]="18" />
                </div>
            </app-nes-panel>

            <p class="instructions">
                Find the best place to put the given two pieces. There’s only one right answer!
            </p>

            <p class="instructions">
                Press z or x to rotate, and click to place!
            </p>

        </div>

    </div>

    <app-timer class="timer" [currentTime]="(puzzleService.getCurrentPuzzleTime$() | async) ?? 0" [maxTime]="puzzleService.getPuzzleTimeLimit()" />
    

</div>
