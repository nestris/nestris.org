<a routerLink="/play"><app-outline-button class="leave-fullscreen-button" label="Exit"/></a>

<app-layout-one class="game" *ngIf="(platform.getPolledGameData() | async) as data"
    [board]="data.board" [level]="data.level"
    [nextPiece]="data.nextPiece"
    [trt]="data.trt"
    [level]="data.level"
    [lines]="data.lines"
    [score]="data.score"
    [drought]="data.drought"
    [das]="data.das"
    [keybinds]="['Rotate (Z & X) / Shift (L arrow & R arrow)', 'Quit (Q) / Restart (R)']"
    />
