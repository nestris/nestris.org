<div class="main-container">
  <div class="main">

    <a routerLink="/online/puzzle"><div class="begin-button" [class.not-logged-in]="!(websocket.onSignInUpdate() | async)">
      <img src="./assets/img/puzzle-button-icons/play.svg" alt="Play" />
      <p>{{(websocket.onSignInUpdate() | async) ? 'Begin' : 'Sign in to start playing!'}}</p>
    </div></a>

    <div class="stat-row">
      <app-elo />
      <app-daily-streak />
      <app-global-rank />
    </div>

  </div>
</div>
