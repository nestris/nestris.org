<div class="tab"
[ngClass]="(sidebarTabService.getSelectedTab() | async)!.tab === tab ? 'selected' : ''"
(click)="onTabClick()">

    <div class="tab-left">
        <img class="icon" [src]="tabIcon" width="20px">
        <h1 class="label">{{ tabName }}</h1>
    </div>

    <div class="tab-right">
        <ng-content></ng-content>
    </div>

</div>
