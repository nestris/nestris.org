<app-solid-button class="add-friend-button"
    label="Add Friend" [color]="ButtonColor.GREEN"
    icon="./assets/img/friend-status-icons/not-friend.svg"
    (click)="toggleFriendModal($event)" />

<app-add-friend-modal
    [visibility$]="friendModalVisibility$" />

<div class="friends-list" *ngIf="friendService.onFriendsInfoUpdate() | async as friendsInfo">
    <app-friend-element *ngFor="let friendInfo of sort(friendsInfo)" [friendInfo]="friendInfo" />
</div>
